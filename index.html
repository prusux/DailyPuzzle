<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dienas Puzzle</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧩</text></svg>">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <header>
            <div class="header-top">
                <h1>Dienas Puzzle</h1>
                <div class="help-btn">?
                    <div class="help-tooltip">
                        <p><strong>Fit all 10 pieces on the board!</strong></p>
                        <ul>
                            <li>Drag and drop.</li>
                            <li>Right-click to rotate pieces.</li>
                            <li>Right double-click to send back to sidebar.</li>
                        </ul>
                    </div>
                </div>
            </div>
            <div class="controls">
                <input type="text" id="player-name" maxlength="10" placeholder="Player X" title="Your Leaderboard Name">
                <button id="today-btn">Today's</button>
                <button id="reset-btn">Random</button>
            </div>
        </header>

        <div id="status-modal" class="modal-overlay">
            <div class="modal-content">
                <p id="status-message"></p>
                <button id="close-modal-btn">OK</button>
            </div>
        </div>

        <main>
            <div class="board-wrapper">
                <div id="board-container">
                    <div id="board"></div>
                </div>
                <div id="clock-container">
                    <div id="timer-display">00:00:000</div>
                    <button id="reveal-btn" style="visibility: hidden; background: #ea580c;">Reveal Solution</button>
                </div>
            </div>
            
            <div id="sidebar">
                <div id="pieces-container"></div>
            </div>
        </main>
        <footer>
            <p id="footer-date"></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
